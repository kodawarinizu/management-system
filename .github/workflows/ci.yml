name: CI

on:
  push:
    branches: [ develop ]
  jobs:
    test:
      steps:
        - cargo test
on:
  pull_request:
    branches: [ main ]
jobs:
  quality:
    steps:
      - cargo fmt --check
      - cargo clippy -- -D warnings
      - cargo test

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      
      - name: Cache
        uses: Swatinem/rust-cache@v2
      
      - name: Format
        run: cargo fmt --check
      
      - name: Clippy
        run: cargo clippy -- -D warnings
      
      - name: Test
        run: cargo test